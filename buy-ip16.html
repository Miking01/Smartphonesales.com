<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Custom CSS -->
        <link rel="stylesheet" href="415_css/buy.css">
        <link rel="stylesheet" href="415_css/style.css">
    </head>
    <body>

        <!-- ================= NAVBAR ================= -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm fixed-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#home">Get-Smart-With-Miking</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarText">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="index.html#phones">Phones</a></li>
                        <li class="nav-item"><a class="nav-link" href="index.html#pricing">Pricing</a></li>
                        <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- ================= PURCHASE SECTION ================= -->
        <section class="purchase-section pt-5 mt-5">
            <div class="container py-5">
                <h2 class="text-center mb-4">Complete Your Purchase</h2>

                <div class="row g-4">
                    <!-- PRODUCT SUMMARY -->
                    <div class="col-md-5">
                        <div class="card shadow-sm">
                            <img src="415_img/Iphone 16.webp" class="card-img-top" alt="Selected Phone">
                            <div class="card-body">
                                <h5 class="card-title">iPhone 16</h5>
                                <p class="price">$999</p>
                                <ul class="list-unstyled">
                                    <li>✔ 256GB Storage</li>
                                    <li>✔ OLED Display</li>
                                    <li>✔ Face ID Security</li>
                                    <li>✔ 1-Year Warranty</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <!-- PURCHASE FORM -->
                    <div class="col-md-7">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="mb-3">Buyer Information</h5>

                                <form>
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Full Name</label>
                                            <input type="text" class="form-control" placeholder="Last-name First-name">
                                        </div>

                                        <div class="col-md-6">
                                            <label class="form-label">Email Address</label>
                                            <input type="email" class="form-control" placeholder="email">
                                        </div>

                                        <div class="col-md-6">
                                            <label class="form-label">Phone Number</label>
                                            <input type="tel" class="form-control" required placeholder="Phone Number">
                                        </div>

                                        <div class="col-md-6">
                                            <label class="form-label">Payment Method</label>
                                            <select class="form-control" required>
                                                <option>Bank Transfer</option>
                                                <option>Pay on Delivery</option>
                                            </select>
                                        </div>

                                        <div class="col-12">
                                            <label class="form-label">Delivery Address</label>
                                            <textarea class="form-control" rows="3" placeholder="Delivery Address" required></textarea>
                                        </div>
                                    </div>

                                    <hr class="my-4">

                                    <div class="d-flex justify-content-between align-items-center">
                                        <h5>Total: <span class="text-primary">$999</span></h5>
                                        <button type="submit" class="btn btn-primary btn-lg">
                                            Confirm Purchase
                                        </button>
                                    </div>
                                </form>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
